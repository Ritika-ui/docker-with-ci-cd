name: Docker CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.sunfloweryyy }}
        password: ${{ secrets.reetika }}

    - name: Build Docker image
      run: docker build -t sunfloweryyy/myapp .

    - name: Push Docker image
      run: docker push sunfloweryyy/myapp
